project_root: ..
data:
  db_csv: Data/DB-ThreatIndicators.csv
  merged_ip_txt: null
  merged_phishing_csv: null
paths:
  artifacts_dir: artifacts
  models_dir: models
  reports_dir: reports
  cache_root: .cache
splits:
  test_days: 90
  validation_days: 60
runtime:
  seed: 42
  default_batch_size: 16
  default_max_length: 384
models:
  default_encoder: modernbert-base
  candidate_encoders:
    - modernbert-base
    - securebert2-base
benchmark:
  target: db_severity
  label_source: DB-ThreatIndicators.csv
  rebuild_dataset: false
  dataset_limit: 5000
  resume: true
  stop_on_error: false
  seeds:
    - 42
  experiments:
    - name: source_type_majority
      enabled: true
      runner: classical
      model: source_type_majority
      group: baselines
      ablation: lookup_majority
    - name: logreg_tfidf_effective
      enabled: true
      runner: classical
      model: logreg_tfidf
      class_balance: effective
      group: baselines
      ablation: class_balance
    - name: xgboost_hybrid_modernbert_effective
      enabled: true
      runner: classical
      model: xgboost_hybrid
      encoder: modernbert-base
      class_balance: effective
      group: hybrid_baselines
      ablation: encoder
    - name: modernbert_lora_balanced_softmax_effective
      enabled: true
      runner: finetune
      encoder: modernbert-base
      peft: lora
      loss: balanced_softmax
      class_balance: effective
      epochs: 1
      max_train_rows: 256
      group: neural_main
      ablation: loss
